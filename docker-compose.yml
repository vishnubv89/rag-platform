services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: rag_postgres
    environment:
      POSTGRES_USER: rag
      POSTGRES_PASSWORD: rag_secret
      POSTGRES_DB: rag_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag -d rag_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rag_backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://rag:rag_secret@postgres:5432/rag_db
      CORS_ORIGINS: '["http://localhost:5173","http://localhost:8080","*"]'
      APP_ENV: development
      JWT_SECRET: ${JWT_SECRET:-change-me-jwt-secret}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 6

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ""
        VITE_ADMIN_KEY: ${ADMIN_SECRET_KEY:-change-me}
    container_name: rag_frontend
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy

  admin-ui:
    build:
      context: ./admin-ui
      dockerfile: Dockerfile
    container_name: rag_admin_ui
    ports:
      - "8080:8080"
    environment:
      BACKEND_URL: http://backend:8000
      ADMIN_SECRET_KEY: ${ADMIN_SECRET_KEY:-change-me}
      SESSION_SECRET: ${SESSION_SECRET:-change-me-session-secret}
      APP_ENV: development
    depends_on:
      backend:
        condition: service_healthy

  backup:
    image: pgvector/pgvector:pg17
    container_name: rag_backup
    entrypoint: >
      sh -c "
        echo '[backup] service started, interval: $${BACKUP_INTERVAL_HOURS}h';
        while true; do
          sh /backup.sh;
          sleep $$(( BACKUP_INTERVAL_HOURS * 3600 ));
        done
      "
    volumes:
      - ./scripts/backup.sh:/backup.sh:ro
      - backups:/backups
    environment:
      PGHOST: postgres
      PGPORT: 5432
      PGUSER: rag
      PGPASSWORD: rag_secret
      PGDATABASE: rag_db
      BACKUP_DIR: /backups
      KEEP_DAYS: ${BACKUP_KEEP_DAYS:-7}
      BACKUP_INTERVAL_HOURS: ${BACKUP_INTERVAL_HOURS:-24}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  backups:
