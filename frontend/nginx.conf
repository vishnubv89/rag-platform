server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Use Docker's embedded DNS resolver and re-resolve upstream addresses
    # every 10 s so nginx picks up the new container IP after a service restart
    # without requiring nginx itself to be reloaded.
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $backend_host "backend:8000";

    # Proxy API requests to the backend container
    location ~ ^/(auth|chat|suggest|orgs|admin|health|docs) {
        proxy_pass http://$backend_host;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
    }

    location ~ ^/ingest {
        proxy_pass http://$backend_host;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 600s;
        client_max_body_size 50m;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
}
