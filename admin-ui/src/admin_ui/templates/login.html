<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RAG Admin — Sign in</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <style>
    body { background: #f0f2f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-card { width: 100%; max-width: 380px; border: none; border-radius: 14px; box-shadow: 0 2px 16px rgba(0,0,0,.12); }
    .login-brand { font-size: 1.4rem; font-weight: 700; color: #212529; }
    .login-sub { font-size: .85rem; color: #6c757d; }
  </style>
</head>
<body>
<div class="card login-card p-4">
  <div class="text-center mb-4">
    <div class="login-brand">&#x1F9E0; RAG Admin</div>
    <div class="login-sub">Sign in with your admin account</div>
  </div>

  {% if error %}
  <div class="alert alert-danger py-2 small">{{ error }}</div>
  {% endif %}

  <form method="post" action="/login">
    <input type="hidden" name="next" value="{{ next }}">
    <div class="mb-3">
      <label class="form-label fw-semibold">Email</label>
      <input class="form-control" type="email" name="email" required autofocus placeholder="admin@example.com">
    </div>
    <div class="mb-4">
      <label class="form-label fw-semibold">Password</label>
      <input class="form-control" type="password" name="password" required placeholder="••••••••">
    </div>
    <button class="btn btn-primary w-100">Sign in</button>
  </form>

  <p class="text-center text-muted small mt-3 mb-0">
    Admin and Superadmin roles only.
  </p>
</div>
</body>
</html>
